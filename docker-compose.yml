# =============================================================================
# DataFlow EU — Docker Compose Stack
# Services: Airflow (webserver + scheduler + worker), PostgreSQL, LocalStack
# Usage: make run
# =============================================================================

x-airflow-common: &airflow-common
  image: apache/airflow:2.9.3-python3.11
  env_file: .env
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@${AIRFLOW_DB_HOST}:${AIRFLOW_DB_PORT}/${AIRFLOW_DB_NAME}
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    PYTHONPATH: /opt/airflow
  volumes:
    - ./dags:/opt/airflow/dags
    - ./extractors:/opt/airflow/extractors
    - ./logs:/opt/airflow/logs
    - ./scripts:/opt/airflow/scripts
    - airflow-plugins:/opt/airflow/plugins
  depends_on:
    postgres:
      condition: service_healthy
  networks:
    - dataflow-net

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL — warehouse + Airflow metadata DB
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: dataflow-postgres
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dataflow-net

  # ---------------------------------------------------------------------------
  # LocalStack — AWS S3 simulation for Bronze layer
  # ---------------------------------------------------------------------------
  localstack:
    image: localstack/localstack:3.4
    container_name: dataflow-localstack
    env_file: .env
    environment:
      SERVICES: s3
      DEFAULT_REGION: ${AWS_DEFAULT_REGION}
      DEBUG: 0
    volumes:
      - localstack-data:/var/lib/localstack
      - ./scripts/init-localstack.sh:/etc/localstack/init/ready.d/init-localstack.sh:ro
    ports:
      - "4566:4566"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4566/_localstack/health | grep -q '\"s3\": \"available\"'"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - dataflow-net

  # ---------------------------------------------------------------------------
  # Airflow — DB init (runs once)
  # ---------------------------------------------------------------------------
  airflow-init:
    <<: *airflow-common
    container_name: dataflow-airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username ${_AIRFLOW_WWW_USER_USERNAME:-admin} \
          --password ${_AIRFLOW_WWW_USER_PASSWORD:-admin} \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@dataflow.eu || true
        echo "Airflow initialized."
    restart: "no"

  # ---------------------------------------------------------------------------
  # Airflow Webserver — UI at http://localhost:8080
  # ---------------------------------------------------------------------------
  airflow-webserver:
    <<: *airflow-common
    container_name: dataflow-airflow-webserver
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health | grep -q 'healthy'"]
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Airflow Scheduler
  # ---------------------------------------------------------------------------
  airflow-scheduler:
    <<: *airflow-common
    container_name: dataflow-airflow-scheduler
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Streamlit Dashboard — UI at http://localhost:8501
  # ---------------------------------------------------------------------------
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: dataflow-dashboard
    env_file: .env
    ports:
      - "8501:8501"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - dataflow-net
    restart: unless-stopped
    profiles:
      - dashboard

# =============================================================================
# Volumes
# =============================================================================
volumes:
  postgres-data:
  localstack-data:
  airflow-plugins:

# =============================================================================
# Networks
# =============================================================================
networks:
  dataflow-net:
    driver: bridge
