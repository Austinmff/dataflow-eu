name: dataflow_eu
version: "1.0.0"
config-version: 2
profile: dataflow_eu
model-paths: ["models"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
target-path: "target"
clean-targets: ["target", "dbt_packages"]
models:
  dataflow_eu:
    bronze:
      +schema: bronze
      +materialized: view
      +tags: ["bronze"]
    silver:
      +schema: silver
      +materialized: incremental
      +on_schema_change: fail
      +tags: ["silver"]
    gold:
      +schema: gold
      +materialized: table
      +tags: ["gold"]
vars:
  start_date: "2019-01-01"
