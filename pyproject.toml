[tool.ruff]
target-version = "py311"
line-length = 100
exclude = [".venv", "dbt/target", "dbt/dbt_packages"]

[tool.ruff.lint]
select = ["E", "W", "F", "I", "B", "UP"]
ignore = ["E501"]

[tool.ruff.lint.isort]
known-first-party = ["extractors"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "--tb=short"

[tool.coverage.run]
source = ["extractors"]
omit = ["tests/*", "dbt/*", "dashboard/*"]

[tool.coverage.report]
fail_under = 70
show_missing = true
